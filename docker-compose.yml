# MarketBubble production stack: Next.js app + chat relay.
#
# Local dev (build from source):
#   cp .env.example .env
#   docker compose up --build -d
#
# GHCR deploy (Coolify — pull pre-built images, no host file mounts):
#   docker build --build-arg NEXT_PUBLIC_SITE_URL=https://your-domain.com \
#     -t ghcr.io/elythi0n/marketbubble:latest .
#   docker build -f relay/Dockerfile -t ghcr.io/elythi0n/marketbubble-relay:latest .
#   docker push ghcr.io/elythi0n/marketbubble:latest
#   docker push ghcr.io/elythi0n/marketbubble-relay:latest
#
# The app listens on APP_PORT (default 3000). Put Caddy/nginx in front for HTTPS.
# The relay is internal-only; the app reaches it at http://relay:8787.
#
# Optional local overrides (live-edit streamers without rebuild):
#   docker-compose.override.yml with streamers.json / relay volume mounts.

name: marketbubble

services:
  relay:
    image: ghcr.io/elythi0n/marketbubble-relay:latest
    build:
      context: .
      dockerfile: relay/Dockerfile
    restart: unless-stopped
    expose:
      - "8787"
    environment:
      PORT: "8787"
      ALLOW_ORIGIN: ${RELAY_ALLOW_ORIGIN:-${NEXT_PUBLIC_SITE_URL:-*}}
      CHANNELS: ${RELAY_CHANNELS:-fazebanks}
      CHATTERS_FILE: /data/chatters.json
      KICK_CHATROOM_ID: ${RELAY_KICK_CHATROOM_ID:-}
      KICK_CHANNEL: ${RELAY_KICK_CHANNEL:-}
    volumes:
      - relay-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal

  app:
    image: ghcr.io/elythi0n/marketbubble:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_DEMO_DISABLED: ${NEXT_PUBLIC_DEMO_DISABLED:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      RELAY_URL: http://relay:8787
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      X_CHAT_API_KEY: ${X_CHAT_API_KEY:-}
      X_BROADCAST_SOURCES: ${X_BROADCAST_SOURCES:-}
      X_WEB_BEARER: ${X_WEB_BEARER:-}
      # AI assistant: server-held provider keys (locked in the UI when set) + per-visitor limits.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ASSISTANT_RPM: ${ASSISTANT_RPM:-5}
      ASSISTANT_RPD: ${ASSISTANT_RPD:-50}
      # Admin board: key (falls back to X_CHAT_API_KEY) + kill switch.
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      ADMIN_DISABLED: ${ADMIN_DISABLED:-}
      X_GQL_USER_BY_SCREEN_NAME: ${X_GQL_USER_BY_SCREEN_NAME:-}
      X_GQL_USER_TWEETS: ${X_GQL_USER_TWEETS:-}
      STREAMERS_JSON: ${STREAMERS_JSON:-}
      X_MENTION_QUERIES: ${X_MENTION_QUERIES:-}
      # Optional persistence (SQLite on the app-data volume). Leave unset to run in-memory.
      DATABASE_PATH: ${DATABASE_PATH:-}
    volumes:
      - app-data:/data
    depends_on:
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal

volumes:
  relay-data:
  app-data:

networks:
  internal:
    driver: bridge
